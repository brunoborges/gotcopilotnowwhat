name: Generate Release Artifacts

on:
  push:
    branches:
      - main
    paths:
      - 'index.html'
      - 'styles.css'
      - 'images/**'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  screenshots:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '22'

      - name: Cache Playwright
        id: cache-playwright
        uses: actions/cache@v5
        with:
          path: |
            node_modules
            ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('node_modules/playwright/package.json') }}
          restore-keys: |
            playwright-${{ runner.os }}-

      - name: Install Playwright
        if: steps.cache-playwright.outputs.cache-hit != 'true'
        run: |
          npm init -y
          npm install playwright
          npx playwright install chromium --with-deps

      - name: Install Chromium system deps
        if: steps.cache-playwright.outputs.cache-hit == 'true'
        run: npx playwright install-deps chromium

      - name: Take screenshots
        run: |
          node << 'EOF'
          const { chromium } = require('playwright');
          const http = require('http');
          const fs = require('fs');
          const path = require('path');

          (async () => {
            const server = http.createServer((req, res) => {
              const url = new URL(req.url, 'http://localhost:3000');
              let filePath = '.' + (url.pathname === '/' ? '/index.html' : url.pathname);
              const ext = path.extname(filePath);
              const types = {
                '.html': 'text/html', '.css': 'text/css',
                '.svg': 'image/svg+xml', '.png': 'image/png',
                '.ico': 'image/x-icon', '.jpg': 'image/jpeg',
                '.webp': 'image/webp'
              };
              fs.readFile(filePath, (err, data) => {
                if (err) { res.writeHead(404); res.end(); return; }
                res.writeHead(200, { 'Content-Type': types[ext] || 'application/octet-stream' });
                res.end(data);
              });
            });

            await new Promise(resolve => server.listen(3000, resolve));
            const browser = await chromium.launch();
            const page = await browser.newPage();

            await page.setViewportSize({ width: 1280, height: 900 });
            await page.goto('http://localhost:3000', { waitUntil: 'networkidle' });
            await page.screenshot({ path: 'desktop-full.png', fullPage: true });

            await page.setViewportSize({ width: 390, height: 844 });
            await page.goto('http://localhost:3000', { waitUntil: 'networkidle' });
            await page.screenshot({ path: 'mobile-full.png', fullPage: true });

            await browser.close();
            server.close();
          })();
          EOF

      - name: Upload screenshot artifacts
        uses: actions/upload-artifact@v4
        with:
          name: screenshots
          path: |
            desktop-full.png
            mobile-full.png

  pdf:
    runs-on: ubuntu-latest
    needs: screenshots
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '22'

      - name: Cache Playwright
        id: cache-playwright
        uses: actions/cache@v5
        with:
          path: |
            node_modules
            ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('node_modules/playwright/package.json') }}
          restore-keys: |
            playwright-${{ runner.os }}-

      - name: Install Playwright
        if: steps.cache-playwright.outputs.cache-hit != 'true'
        run: |
          npm init -y
          npm install playwright
          npx playwright install chromium --with-deps

      - name: Install Chromium system deps
        if: steps.cache-playwright.outputs.cache-hit == 'true'
        run: npx playwright install-deps chromium

      - name: Generate PDF
        run: |
          node << 'EOF'
          const { chromium } = require('playwright');
          const http = require('http');
          const fs = require('fs');
          const path = require('path');

          (async () => {
            const server = http.createServer((req, res) => {
              const url = new URL(req.url, 'http://localhost:3000');
              let filePath = '.' + (url.pathname === '/' ? '/index.html' : url.pathname);
              const ext = path.extname(filePath);
              const types = {
                '.html': 'text/html', '.css': 'text/css',
                '.svg': 'image/svg+xml', '.png': 'image/png',
                '.ico': 'image/x-icon', '.jpg': 'image/jpeg',
                '.webp': 'image/webp'
              };
              fs.readFile(filePath, (err, data) => {
                if (err) { res.writeHead(404); res.end(); return; }
                res.writeHead(200, { 'Content-Type': types[ext] || 'application/octet-stream' });
                res.end(data);
              });
            });

            await new Promise(resolve => server.listen(3000, resolve));
            const browser = await chromium.launch();
            const page = await browser.newPage();
            await page.setViewportSize({ width: 1280, height: 900 });
            await page.goto('http://localhost:3000', { waitUntil: 'networkidle' });
            await page.pdf({
              path: 'got-copilot-now-what.pdf',
              format: 'A4',
              printBackground: true,
              margin: { top: '0px', bottom: '0px', left: '0px', right: '0px' }
            });
            await browser.close();
            server.close();
          })();
          EOF

      - name: Upload PDF artifact
        uses: actions/upload-artifact@v4
        with:
          name: pdf
          path: got-copilot-now-what.pdf

  release:
    runs-on: ubuntu-latest
    needs: [screenshots, pdf]
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG="build-$(date -u +%Y%m%d-%H%M%S)"
          SHORT_SHA=$(git rev-parse --short HEAD)
          gh release create "$TAG" \
            --title "Page snapshot — ${SHORT_SHA}" \
            --notes "Auto-generated from commit ${GITHUB_SHA}." \
            --latest \
            artifacts/desktop-full.png \
            artifacts/mobile-full.png \
            artifacts/got-copilot-now-what.pdf
