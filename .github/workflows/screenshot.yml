name: Capture Page Screenshots

on:
  push:
    branches:
      - main
    paths:
      - 'index.html'
      - 'styles.css'
      - 'images/**'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  screenshot:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install Playwright
        run: |
          npm init -y
          npm install playwright
          npx playwright install chromium --with-deps

      - name: Take screenshots
        run: |
          node << 'EOF'
          const { chromium } = require('playwright');

          (async () => {
            const fs = require('fs');
            fs.mkdirSync('screenshots', { recursive: true });

            const browser = await chromium.launch();
            const page = await browser.newPage();

            // Serve the page locally
            const http = require('http');
            const path = require('path');
            const server = http.createServer((req, res) => {
              const url = new URL(req.url, 'http://localhost:3000');
              let filePath = '.' + (url.pathname === '/' ? '/index.html' : url.pathname);
              const ext = path.extname(filePath);
              const types = { '.html': 'text/html', '.css': 'text/css' };
              fs.readFile(filePath, (err, data) => {
                if (err) { res.writeHead(404); res.end(); return; }
                res.writeHead(200, { 'Content-Type': types[ext] || 'application/octet-stream' });
                res.end(data);
              });
            });

            await new Promise(resolve => server.listen(3000, resolve));

            // Desktop screenshot (1280x900)
            await page.setViewportSize({ width: 1280, height: 900 });
            await page.goto('http://localhost:3000', { waitUntil: 'networkidle' });
            await page.screenshot({ path: 'screenshots/desktop-full.png', fullPage: true });

            // Mobile screenshot (390x844 — iPhone 14 size)
            await page.setViewportSize({ width: 390, height: 844 });
            await page.goto('http://localhost:3000', { waitUntil: 'networkidle' });
            await page.screenshot({ path: 'screenshots/mobile-full.png', fullPage: true });

            await browser.close();
            server.close();
          })();
          EOF

      - name: Commit screenshots
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add screenshots/
          git diff --cached --quiet && echo "No screenshot changes" && exit 0
          git commit -m "chore: update page screenshots"
          git push
